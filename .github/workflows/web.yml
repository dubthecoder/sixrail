name: Web

on:
  push:
    branches: [main]
    paths: [web/**]
  pull_request:
    paths: [web/**]

defaults:
  run:
    working-directory: web

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - run: npm run check

      - run: npm run lint

      - run: npm run build
