name: Web

on:
  push:
    branches: [main]
    paths:
      - services/web/**
      - .github/workflows/web.yml
  pull_request:
    paths:
      - services/web/**
      - .github/workflows/web.yml
  workflow_dispatch:

defaults:
  run:
    working-directory: services/web

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/web/package-lock.json

      - run: npm ci

      - run: npm run test:ci

      - run: npm run check

      - run: npm run lint

      - run: npm run build
